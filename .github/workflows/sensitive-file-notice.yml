name: Sensitive File Notice

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check for sensitive file changes
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;

            const isFork = pr.head.repo && (pr.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`);
            if (isFork && context.payload.action === 'synchronize') {
              console.log('Skipping comment on sync for fork PRs');
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            const rules = [
              {
                pattern: /^MODULE\.bazel$/,
                emoji: '📦',
                label: 'Dependency change',
                note: 'Modifies the Bazel module graph — needs runtime team review after import.',
              },
              {
                pattern: /^third-party\/yoga\//,
                emoji: '🧘',
                label: 'Yoga layout engine',
                note: 'HIGH blast radius — affects all layout. Verify layout tests exist and pass.',
              },
              {
                pattern: /\.(bzl|bazelrc)$|^bzl\//,
                emoji: '🔧',
                label: 'Build rules',
                note: 'Affects build rules for all Valdi consumers.',
              },
              {
                pattern: /^bin\//,
                emoji: '📎',
                label: 'Prebuilt binary',
                note: 'Changes a prebuilt binary — requires verification of provenance.',
              },
              {
                pattern: /^valdi\/src\/valdi\/runtime\/(ViewNode|Runtime|ViewNodeTree)\./,
                emoji: '⚠️',
                label: 'Core runtime',
                note: 'App-wide blast radius — touches the rendering core. Must be gated.',
              },
            ];

            const notices = [];
            for (const file of files) {
              for (const rule of rules) {
                if (rule.pattern.test(file.filename)) {
                  const key = rule.label;
                  if (!notices.find(n => n.label === key)) {
                    notices.push(rule);
                  }
                }
              }
            }

            if (notices.length === 0) return;

            const marker = '<!-- sensitive-file-notice -->';
            const body = marker + '\n## Sensitive Files Detected\n\n'
              + notices.map(n => `${n.emoji} **${n.label}** — ${n.note}`).join('\n\n')
              + '\n\n<sub>This is an automated notice. A maintainer will review after import.</sub>';

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: body,
              });
            }
